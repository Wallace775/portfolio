<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automação de Atendimento - Chatbot | Wallace Phellipe</title>
    <meta name="description" content="Chatbot de automação de atendimento desenvolvido por Wallace Phellipe">
    
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS Interno -->
    <style>
        /* Reset e garantia de altura total */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Arial', sans-serif;
        }

        /* Botão flutuante de voltar */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #00509e;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 80, 158, 0.4);
        }

        .back-button:hover {
            background-color: #00397a;
            transform: translateX(-3px);
            box-shadow: 0 6px 20px rgba(0, 80, 158, 0.6);
        }

        .back-button i {
            font-size: 1rem;
        }

        /* Container do Typebot */
        #typebot-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Typebot padrão - Garantia de visibilidade */
        typebot-standard {
            display: block !important;
            width: 100% !important;
            height: 100vh !important;
            min-height: 100vh;
        }

        /* Responsivo para mobile */
        @media (max-width: 768px) {
            .back-button {
                padding: 10px 16px;
                font-size: 0.85rem;
                top: 15px;
                left: 15px;
            }

            .back-button span {
                display: none;
            }

            .back-button i {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Botão flutuante de voltar -->
    <a href="index.html" class="back-button" aria-label="Voltar ao portfólio">
        <i class="fas fa-arrow-left"></i>
        <span>Voltar ao Portfólio</span>
    </a>

    <!-- Container do Typebot -->
    <div id="typebot-container">
        <typebot-standard
            id="botbar-Orppypm"
        ></typebot-standard>
    </div>

    <!-- Script do Typebot via CDN oficial -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@typebot.io/js@0/dist/web.js"></script>
</body>
</html>
